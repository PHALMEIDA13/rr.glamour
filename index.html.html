<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RR GLAMOUR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream:   #faf7f4;
  --blush:   #f5ede8;
  --gold-hi: #f0d898;
  --gold:    #c9a84c;
  --gold-md: #b5912f;
  --gold-dk: #8c6c1a;
  --muted:   #9c8070;
  --ink:     #2a1f14;
}

html { scroll-behavior: smooth; }
body {
  background: var(--cream);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

/* PAGE */
.page {
  width: 100%;
  max-width: 430px;
  min-height: 100dvh;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 52px;
  background:
    radial-gradient(ellipse 110% 50% at 50% 0%,   #f6e9e4 0%, transparent 62%),
    radial-gradient(ellipse 65%  55% at 100% 85%,  #edddd4 0%, transparent 55%),
    radial-gradient(ellipse 50%  45% at 0%   55%,  #f2e0d8 0%, transparent 55%),
    linear-gradient(175deg, #faf6f3 0%, #f5ece6 45%, #edddd5 100%);
}

/* noise grain */
.page::before {
  content: '';
  position: fixed; inset: 0; max-width: 430px;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.03;
  pointer-events: none;
  z-index: 0;
}

/* top gold rule */
.top-rule {
  position: relative; z-index: 2;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--gold-md) 28%, var(--gold-hi) 50%, var(--gold-md) 72%, transparent 100%);
}

/* ─── HERO ─── */
.hero {
  position: relative; z-index: 2;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 28px 40px;
}

/* eyebrow */
.eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 9.5px;
  letter-spacing: 6.5px;
  text-transform: uppercase;
  color: var(--gold-md);
  margin-bottom: 30px;
  opacity: 0;
  animation: rise 0.9s 0.15s ease forwards;
}

/* monogram */
.mono-wrap {
  position: relative;
  width: 86px; height: 86px;
  margin-bottom: 30px;
  opacity: 0;
  animation: rise 0.9s 0.3s ease forwards;
}
.mono-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.55);
}
.mono-ring-2 {
  position: absolute; inset: 9px;
  border-radius: 50%;
  border: 1px solid rgba(240,216,152,0.3);
}
/* rotating conic shimmer */
.mono-wrap::after {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, transparent 70%, rgba(240,216,152,0.3) 85%, transparent 100%);
  animation: spin 10s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.mono-inner {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.mono-letters {
  font-family: 'Cinzel', serif;
  font-weight: 500;
  font-size: 24px;
  letter-spacing: 4px;
  background: linear-gradient(155deg, var(--gold-dk) 0%, var(--gold-md) 22%, var(--gold) 42%, var(--gold-hi) 58%, var(--gold) 74%, var(--gold-dk) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gold-sweep 6s 1.2s ease-in-out infinite;
}
@keyframes gold-sweep {
  0%,100% { background-position: 0% center; }
  50%      { background-position: 100% center; }
}

/* brand name */
.brand-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  opacity: 0;
  animation: rise 0.9s 0.45s ease forwards;
}
.brand-name {
  font-family: 'Cinzel', serif;
  font-weight: 500;
  font-size: clamp(28px, 8vw, 36px);
  letter-spacing: 9px;
  line-height: 1.1;
  background: linear-gradient(160deg,
    var(--gold-dk) 0%,
    var(--gold-md) 18%,
    var(--gold)    38%,
    var(--gold-hi) 52%,
    var(--gold)    66%,
    var(--gold-md) 82%,
    var(--gold-dk) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gold-sweep 6s 1.4s ease-in-out infinite;
}

/* butterfly (positioned after brand name inline) */
.butterfly-row {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}
.butterfly {
  display: inline-block;
  animation: flutter 7s 1.6s ease-in-out infinite;
}
@keyframes flutter {
  0%,100% { transform: translateY(0)   rotate(-5deg); }
  35%      { transform: translateY(-6px) rotate(3deg); }
  65%      { transform: translateY(-3px) rotate(-2deg); }
}

.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--muted);
  margin-top: 14px;
  opacity: 0;
  animation: rise 0.9s 0.6s ease forwards;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── ORNAMENT ─── */
.orn {
  position: relative; z-index: 2;
  display: flex; align-items: center; gap: 12px;
  padding: 0 44px; width: 100%;
  margin: 6px 0 38px;
  opacity: 0;
  animation: rise 0.9s 0.7s ease forwards;
}
.orn-bar {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-md), transparent);
  opacity: 0.4;
}
.orn-gem {
  width: 5px; height: 5px;
  background: var(--gold);
  transform: rotate(45deg);
  box-shadow: 0 0 5px rgba(201,168,76,0.55);
  opacity: 0.75;
}

/* ─── PRODUCT STRIP ─── */
.products {
  position: relative; z-index: 2;
  width: 100%; padding: 0 22px;
  margin-bottom: 42px;
  opacity: 0;
  animation: rise 0.9s 0.8s ease forwards;
}
.sec-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 10.5px;
  letter-spacing: 4.5px;
  color: var(--gold-md);
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 14px;
  opacity: 0.8;
}
.prod-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
}
.prod-card {
  aspect-ratio: 3/4;
  border-radius: 3px;
  background:
    radial-gradient(ellipse at 35% 20%, rgba(255,255,255,0.45) 0%, transparent 60%),
    linear-gradient(155deg, #f6ecea 0%, #ecdcd6 100%);
  border: 1px solid rgba(201,168,76,0.18);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: 11px; gap: 5px;
  position: relative; overflow: hidden;
  cursor: pointer;
  transition: transform 0.32s cubic-bezier(.25,.8,.25,1), border-color 0.3s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}
.prod-card:hover {
  transform: translateY(-5px);
  border-color: rgba(201,168,76,0.4);
}
.prod-card::before {
  content: '';
  position: absolute; top: 0; inset: 0 0 55%;
  background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
  pointer-events: none;
}
/* placeholder icon */
.prod-icon {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.prod-icon svg { opacity: 0.12; }

.prod-name {
  position: relative; z-index: 1;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 9.5px;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--gold-dk);
}

/* ─── BUTTONS ─── */
.btns {
  position: relative; z-index: 2;
  width: 100%; padding: 0 26px;
  display: flex; flex-direction: column; gap: 12px;
  margin-bottom: 38px;
  opacity: 0;
  animation: rise 0.9s 0.9s ease forwards;
}

.btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%;
  padding: 17px 22px;
  border-radius: 2px;
  border: none; cursor: pointer;
  text-decoration: none;
  position: relative; overflow: hidden;
  transition: transform 0.22s cubic-bezier(.25,.8,.25,1), box-shadow 0.22s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover  { transform: translateY(-2px); }
.btn:active { transform: scale(0.99); }

/* shimmer */
.btn::before {
  content: '';
  position: absolute; top: 0; left: -80%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: skewX(-12deg);
  transition: left 0.5s;
  pointer-events: none;
}
.btn:hover::before { left: 135%; }

/* top specular line */
.btn::after {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: rgba(255,255,255,0.5);
  pointer-events: none;
}

/* SOLID GOLD */
.btn-gold {
  background: linear-gradient(175deg,
    #b8881e 0%,
    #d4a83c 14%,
    #eacf6c 28%,
    #c9a84c 50%,
    #a07620 68%,
    #c4a040 100%);
  box-shadow:
    inset 0  1px 0 rgba(255,240,150,0.5),
    inset 0 -1px 0 rgba(80,50,0,0.25),
    0 5px 0 #7a5c10,
    0 7px 20px rgba(160,110,20,0.35);
}
.btn-gold:hover {
  box-shadow:
    inset 0  1px 0 rgba(255,240,150,0.5),
    inset 0 -1px 0 rgba(80,50,0,0.25),
    0 7px 0 #7a5c10,
    0 10px 28px rgba(160,110,20,0.42);
}
.btn-gold:active {
  box-shadow:
    inset 0  1px 0 rgba(255,240,150,0.5),
    inset 0 -1px 0 rgba(80,50,0,0.25),
    0 2px 0 #7a5c10,
    0 4px 10px rgba(160,110,20,0.28);
}

/* OUTLINE SOFT */
.btn-soft {
  background: rgba(252,248,244,0.82);
  backdrop-filter: blur(14px);
  box-shadow:
    0 0 0 1px rgba(201,168,76,0.42),
    inset 0 1px 0 rgba(255,255,255,0.85),
    0 4px 0 rgba(180,140,20,0.1),
    0 5px 16px rgba(201,168,76,0.1);
}
.btn-soft:hover {
  background: rgba(255,251,246,0.94);
  box-shadow:
    0 0 0 1px rgba(201,168,76,0.62),
    inset 0 1px 0 rgba(255,255,255,0.9),
    0 5px 0 rgba(180,140,20,0.12),
    0 8px 22px rgba(201,168,76,0.18);
}

.btn-icon {
  font-size: 15px; opacity: 0.88;
  position: relative; z-index: 1;
}
.btn-text {
  position: relative; z-index: 1;
  font-family: 'Cinzel', serif;
  font-weight: 400;
  font-size: 11px;
  letter-spacing: 3.5px;
  text-transform: uppercase;
}
.btn-gold .btn-text {
  color: #35200a;
  text-shadow: 0 1px 2px rgba(255,220,80,0.35);
}
.btn-soft .btn-text {
  background: linear-gradient(135deg, var(--gold-dk), var(--gold), var(--gold-md));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.badge {
  position: absolute; top: -8px; right: 18px;
  background: #b03020;
  color: #fff;
  font-family: 'Cinzel', serif;
  font-size: 7.5px;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 1px;
  box-shadow: 0 2px 8px rgba(160,30,20,0.4);
  z-index: 3;
}

/* ─── SOCIAL ─── */
.social {
  position: relative; z-index: 2;
  display: flex; gap: 16px;
  margin-bottom: 36px;
  opacity: 0;
  animation: rise 0.9s 1s ease forwards;
}
.soc {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  text-decoration: none; cursor: pointer;
}
.soc-circle {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(252,248,244,0.78);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(201,168,76,0.25);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(201,168,76,0.08), inset 0 1px 0 rgba(255,255,255,0.75);
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
}
.soc:hover .soc-circle {
  transform: translateY(-3px);
  border-color: rgba(201,168,76,0.5);
  box-shadow: 0 6px 18px rgba(201,168,76,0.18), inset 0 1px 0 rgba(255,255,255,0.8);
}
.soc-svg { width: 18px; height: 18px; }
.soc-label {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
}

/* ─── FOOTER ─── */
.footer {
  position: relative; z-index: 2;
  text-align: center; padding: 0 32px;
  opacity: 0;
  animation: rise 0.9s 1.1s ease forwards;
}
.footer-rule {
  width: 40px; height: 1px; margin: 0 auto 14px;
  background: linear-gradient(90deg, transparent, var(--gold-md), transparent);
  opacity: 0.38;
}
.footer-copy {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 10.5px; letter-spacing: 1.5px;
  color: var(--muted); opacity: 0.7;
}
.footer-copy b {
  font-style: normal; font-weight: 400;
  color: var(--gold-md);
}
</style>
</head>
<body>
<div class="page">

  <div class="top-rule"></div>

  <!-- HERO -->
  <section class="hero">

    <p class="eyebrow">Folheados · Alto Padrão</p>

    <!-- Monogram ring -->
    <div class="mono-wrap">
      <div class="mono-ring"></div>
      <div class="mono-ring-2"></div>
      <div class="mono-inner">
        <span class="mono-letters">RR</span>
      </div>
    </div>

    <!-- Brand name + butterfly -->
    <div class="brand-wrap">
      <span class="brand-name">RR GLAMOUR</span>
      <div class="butterfly-row">
        <div class="butterfly">
          <svg width="42" height="30" viewBox="0 0 84 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#f0d898"/>
                <stop offset="42%"  stop-color="#c9a84c"/>
                <stop offset="100%" stop-color="#8c6c1a"/>
              </linearGradient>
              <linearGradient id="gr" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%"   stop-color="#f0d898"/>
                <stop offset="42%"  stop-color="#c9a84c"/>
                <stop offset="100%" stop-color="#8c6c1a"/>
              </linearGradient>
              <linearGradient id="glb" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"  stop-color="#d4a83c"/>
                <stop offset="100%" stop-color="#8c6c1a"/>
              </linearGradient>
              <filter id="gw">
                <feGaussianBlur stdDeviation="1.2" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <!-- upper left -->
            <path d="M41 26 C34 12 10 1 3 14 C-2 24 15 38 40 30Z"
                  fill="url(#gl)" opacity=".93" filter="url(#gw)"/>
            <!-- upper right -->
            <path d="M43 26 C50 12 74 1 81 14 C86 24 69 38 44 30Z"
                  fill="url(#gr)" opacity=".93" filter="url(#gw)"/>
            <!-- lower left -->
            <path d="M40 30 C25 38 10 50 16 56 C22 62 37 50 41 34Z"
                  fill="url(#glb)" opacity=".72" filter="url(#gw)"/>
            <!-- lower right -->
            <path d="M44 30 C59 38 74 50 68 56 C62 62 47 50 43 34Z"
                  fill="url(#gr)" opacity=".72" filter="url(#gw)"/>
            <!-- vein highlights -->
            <path d="M41 26 C34 15 18 8 9 17" stroke="#f0d898" stroke-width="0.75" opacity=".5" fill="none"/>
            <path d="M43 26 C50 15 66 8 75 17" stroke="#f0d898" stroke-width="0.75" opacity=".5" fill="none"/>
            <!-- body -->
            <ellipse cx="42" cy="30" rx="2.4" ry="12" fill="url(#gl)" opacity=".85"/>
            <ellipse cx="41.3" cy="24" rx="1" ry="5" fill="rgba(255,248,190,.48)"/>
            <!-- head -->
            <circle cx="42" cy="17" r="3.2" fill="#c9a84c"/>
            <!-- antennae -->
            <path d="M40.5 15 Q37 7 34 5" stroke="#a87a28" stroke-width="1.1" fill="none" stroke-linecap="round"/>
            <path d="M43.5 15 Q47 7 50 5" stroke="#a87a28" stroke-width="1.1" fill="none" stroke-linecap="round"/>
            <circle cx="34" cy="5" r="1.8" fill="#c9a84c"/>
            <circle cx="50" cy="5" r="1.8" fill="#c9a84c"/>
          </svg>
        </div>
      </div>
    </div>

    <p class="tagline">Elegância que se usa</p>

  </section>

  <!-- Ornament -->
  <div class="orn">
    <div class="orn-bar"></div>
    <div class="orn-gem"></div>
    <div class="orn-bar" style="max-width:30px"></div>
    <div class="orn-gem"></div>
    <div class="orn-bar"></div>
  </div>

  <!-- Products -->
  <div class="products">
    <p class="sec-label">Coleção</p>
